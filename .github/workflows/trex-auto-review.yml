name: TRex Automatic Code Review

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  trex-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Go environment
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Verify code quality
        id: verify
        run: |
          echo "Running TRex code verification..."
          
          # Check if code compiles
          if ! go build ./...; then
            echo "build_failed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Run linting
          if command -v golangci-lint >/dev/null 2>&1; then
            if ! golangci-lint run --timeout=5m; then
              echo "lint_failed=true" >> $GITHUB_OUTPUT
            fi
          fi
          
          # Run tests
          if ! go test ./... -short; then
            echo "test_failed=true" >> $GITHUB_OUTPUT
          fi
          
          # Check for common security issues
          if grep -r "log.*token\|log.*password\|log.*secret" . --include="*.go" | grep -v "len(token)\|len(password)\|len(secret)"; then
            echo "security_issues=true" >> $GITHUB_OUTPUT
          fi

      - name: TRex Code Review Analysis
        id: review
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Get PR files changed
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            console.log(`Analyzing ${files.length} changed files`);
            
            // Read TRex review guidance files
            const reviewGuidance = {
              context: {
                backend: fs.readFileSync('.claude/context/backend-development.md', 'utf8'),
                database: fs.readFileSync('.claude/context/database-development.md', 'utf8'),
                security: fs.readFileSync('.claude/context/security-standards.md', 'utf8')
              },
              patterns: {
                errorHandling: fs.readFileSync('.claude/patterns/error-handling.md', 'utf8'),
                authMiddleware: fs.readFileSync('.claude/patterns/auth-middleware.md', 'utf8'),
                testing: fs.readFileSync('.claude/patterns/testing-patterns.md', 'utf8')
              }
            };
            
            // Analyze changed files
            let findings = [];
            let criticalIssues = 0;
            let majorIssues = 0;
            let minorIssues = 0;
            
            for (const file of files) {
              if (!file.filename.endsWith('.go')) continue;
              
              console.log(`Analyzing ${file.filename}`);
              const content = file.patch || '';
              
              // Security checks
              if (content.includes('log.') && (content.includes('token') || content.includes('password') || content.includes('secret'))) {
                if (!content.includes('len(token)') && !content.includes('len(password)') && !content.includes('len(secret)')) {
                  findings.push({
                    file: file.filename,
                    severity: 'CRITICAL',
                    issue: 'Potential secret logging detected',
                    description: 'Secrets should never be logged. Use token length instead: `len(token)`'
                  });
                  criticalIssues++;
                }
              }
              
              // Framework compliance checks
              if (file.filename.includes('handlers/') && content.includes('+')) {
                if (!content.includes('errors.HandleServiceError') && !content.includes('errors.BadRequest')) {
                  findings.push({
                    file: file.filename,
                    severity: 'MAJOR',
                    issue: 'Handler missing proper error handling',
                    description: 'Use TRex error types: errors.BadRequest, errors.NotFound, etc.'
                  });
                  majorIssues++;
                }
                
                if (content.includes('panic(') || content.includes('log.Fatal')) {
                  findings.push({
                    file: file.filename,
                    severity: 'CRITICAL',
                    issue: 'Handler contains panic() or log.Fatal()',
                    description: 'Use proper error handling instead of panic() in handlers'
                  });
                  criticalIssues++;
                }
              }
              
              // Database pattern checks
              if (file.filename.includes('dao/') || file.filename.includes('services/')) {
                if (content.includes('db.Exec') && content.includes('fmt.Sprintf')) {
                  findings.push({
                    file: file.filename,
                    severity: 'CRITICAL',
                    issue: 'SQL injection vulnerability',
                    description: 'Use parameterized queries instead of string concatenation'
                  });
                  criticalIssues++;
                }
                
                if (content.includes('gorm.DB') && !content.includes('WithContext')) {
                  findings.push({
                    file: file.filename,
                    severity: 'MAJOR',
                    issue: 'Database operation missing context',
                    description: 'Always use .WithContext(ctx) for database operations'
                  });
                  majorIssues++;
                }
              }
              
              // Testing checks
              if (file.filename.includes('_test.go')) {
                if (content.includes('func Test') && !content.includes('assert.') && !content.includes('require.')) {
                  findings.push({
                    file: file.filename,
                    severity: 'MINOR',
                    issue: 'Test missing assertions',
                    description: 'Use testify assert/require for proper test assertions'
                  });
                  minorIssues++;
                }
              }
              
              // Migration checks
              if (file.filename.includes('migrations/')) {
                if (content.includes('AutoMigrate') && !content.includes('Rollback')) {
                  findings.push({
                    file: file.filename,
                    severity: 'MAJOR',
                    issue: 'Migration missing rollback',
                    description: 'All migrations must be reversible with proper Rollback function'
                  });
                  majorIssues++;
                }
              }
              
              // API design checks
              if (content.includes('http.StatusCreated') && !content.includes('Location')) {
                findings.push({
                  file: file.filename,
                  severity: 'MINOR',
                  issue: 'Created response missing Location header',
                  description: 'Set Location header for 201 Created responses'
                });
                minorIssues++;
              }
            }
            
            // Build verification issues
            const buildFailed = '${{ steps.verify.outputs.build_failed }}' === 'true';
            const lintFailed = '${{ steps.verify.outputs.lint_failed }}' === 'true';
            const testFailed = '${{ steps.verify.outputs.test_failed }}' === 'true';
            const securityIssues = '${{ steps.verify.outputs.security_issues }}' === 'true';
            
            if (buildFailed) {
              findings.push({
                file: 'Build',
                severity: 'CRITICAL',
                issue: 'Code does not compile',
                description: 'Fix compilation errors before review'
              });
              criticalIssues++;
            }
            
            if (lintFailed) {
              findings.push({
                file: 'Linting',
                severity: 'MAJOR',
                issue: 'Linting failures detected',
                description: 'Run `make lint` and fix all issues'
              });
              majorIssues++;
            }
            
            if (testFailed) {
              findings.push({
                file: 'Tests',
                severity: 'MAJOR',
                issue: 'Test failures detected',
                description: 'Ensure all tests pass before review'
              });
              majorIssues++;
            }
            
            if (securityIssues) {
              findings.push({
                file: 'Security',
                severity: 'CRITICAL',
                issue: 'Potential secret logging detected',
                description: 'Never log secrets - use token length instead'
              });
              criticalIssues++;
            }
            
            // Generate review comment
            let comment = `## 🤖 TRex Automated Code Review\n\n`;
            comment += `**Files Reviewed:** ${files.length}\n`;
            comment += `**Issues Found:** ${criticalIssues} Critical, ${majorIssues} Major, ${minorIssues} Minor\n\n`;
            
            if (findings.length === 0) {
              comment += `✅ **Excellent!** No issues found. Code follows TRex standards.\n\n`;
              comment += `### Pre-merge Checklist\n`;
              comment += `- [ ] All tests passing\n`;
              comment += `- [ ] Code review approved\n`;
              comment += `- [ ] Documentation updated if needed\n`;
            } else {
              comment += `### 🔍 Review Findings\n\n`;
              
              const criticalFindings = findings.filter(f => f.severity === 'CRITICAL');
              if (criticalFindings.length > 0) {
                comment += `#### 🚨 Critical Issues (Must Fix)\n`;
                for (const finding of criticalFindings) {
                  comment += `- **${finding.file}**: ${finding.issue}\n`;
                  comment += `  - ${finding.description}\n\n`;
                }
              }
              
              const majorFindings = findings.filter(f => f.severity === 'MAJOR');
              if (majorFindings.length > 0) {
                comment += `#### ⚠️ Major Issues (Should Fix)\n`;
                for (const finding of majorFindings) {
                  comment += `- **${finding.file}**: ${finding.issue}\n`;
                  comment += `  - ${finding.description}\n\n`;
                }
              }
              
              const minorFindings = findings.filter(f => f.severity === 'MINOR');
              if (minorFindings.length > 0) {
                comment += `#### ℹ️ Minor Issues (Consider Fixing)\n`;
                for (const finding of minorFindings) {
                  comment += `- **${finding.file}**: ${finding.issue}\n`;
                  comment += `  - ${finding.description}\n\n`;
                }
              }
            }
            
            comment += `### 📚 TRex Standards Reference\n\n`;
            comment += `For detailed guidance, see the TRex memory system:\n`;
            comment += `- [Backend Development Patterns](.claude/context/backend-development.md)\n`;
            comment += `- [Security Standards](.claude/context/security-standards.md)\n`;
            comment += `- [Database Patterns](.claude/context/database-development.md)\n`;
            comment += `- [Error Handling](.claude/patterns/error-handling.md)\n`;
            comment += `- [Testing Patterns](.claude/patterns/testing-patterns.md)\n\n`;
            
            comment += `### 🎯 Approval Status\n`;
            if (criticalIssues > 0) {
              comment += `❌ **Changes Requested** - Critical issues must be resolved\n`;
            } else if (majorIssues > 0) {
              comment += `⚠️ **Review Required** - Major issues should be addressed\n`;
            } else {
              comment += `✅ **Approved** - Ready for human review\n`;
            }
            
            comment += `\n---\n*Automated review by TRex standards engine*`;
            
            return comment;

      - name: Post review comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = `${{ steps.review.outputs.result }}`;
            
            // Check if we already posted a review comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🤖 TRex Automated Code Review')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Set PR status
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const criticalIssues = ${{ steps.verify.outputs.build_failed === 'true' || steps.verify.outputs.security_issues === 'true' }};
            
            if (criticalIssues) {
              // Request changes for critical issues
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'REQUEST_CHANGES',
                body: 'Critical issues detected by automated TRex review. Please address before merge.'
              });
            }